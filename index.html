<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#1e1b4b">
    <title>OpenCode - Seu Amigo Digital</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Header Simples -->
        <header class="header">
            <div class="header-content">
                <div class="logo">
                    <span class="logo-icon">🤖</span>
                    <span class="logo-text">OpenCode</span>
                </div>
            </div>
        </header>

        <!-- Status da IA -->
        <div id="aiStatus" class="ai-status">
            <div class="status-dot"></div>
            <span class="status-text">Preparando sua ajuda...</span>
        </div>

        <!-- Área de B Ajuda Rápida -->
        <div class="quick-help" id="quickHelp">
            <p>Digite sua mensagem e envie!</p>
        </div>

        <!-- Chat -->
        <main class="chat-container" id="chatContainer">
            <div id="messagesContainer"></div>
        </main>

        <!-- Input Simples -->
        <footer class="input-area">
            <div class="input-wrapper">
                <textarea 
                    id="userInput" 
                    placeholder="Digite sua mensagem aqui..." 
                    rows="1"
                ></textarea>
                <button id="sendBtn" class="send-btn" disabled>
                    <span>➤</span>
                </button>
            </div>
        </footer>

        <!-- Loading -->
        <div id="loadingOverlay" class="loading-overlay hidden">
            <div class="loader">
                <div class="spinner"></div>
                <p id="loadingText">Preparing your help...</p>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
